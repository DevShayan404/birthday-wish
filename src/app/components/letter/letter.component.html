<section class="letter-section" id="letter" #section>
  <div class="heading">
    <p class="eyebrow">A letter, just for you</p>
    <h2>From My Heart</h2>
  </div>

  <div class="paper">
    <span class="tape tape-l"></span>
    <span class="tape tape-r"></span>
    <div class="paper-inner">
      <p class="text">{{ displayed() }}<span class="cursor"></span></p>
    </div>
    <div class="seal">♥</div>
  </div>
</section>

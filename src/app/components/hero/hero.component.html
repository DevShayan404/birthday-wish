<section class="hero" id="hero">
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="balloons" aria-hidden="true">
    <span
      *ngFor="let b of balloons"
      class="balloon"
      [style.left.%]="b.left"
      [style.animation-delay.s]="b.delay"
      [style.animation-duration.s]="b.duration"
      [style.--c]="b.color"
    >
      <span class="balloon-body" [style.background]="b.color"></span>
      <span class="balloon-string"></span>
    </span>
  </div>

  <div class="petals" aria-hidden="true">
    <span
      *ngFor="let h of hearts"
      class="petal"
      [style.left.%]="h.left"
      [style.animation-delay.s]="h.delay"
      [style.animation-duration.s]="h.duration"
      [style.font-size.px]="h.size"
    >❀</span>
  </div>

  <div class="content">
    <div class="ornament-line"><span></span><em>♥</em><span></span></div>
    <p class="eyebrow">A celebration of you</p>
    <h1 class="title">
      <span class="line-1">Happy Birthday,</span>
      <span class="line-2">{{ name }}</span>
    </h1>
    <p class="subtitle">Today is all about you, my love</p>
    <button class="cta" (click)="onBegin()">
      <span>Begin the Journey</span>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <div class="scroll-hint" aria-hidden="true">
    <span></span>
  </div>
</section>
